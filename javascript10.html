<!DOCTYPE html>
<html>
<head>
<style>
body {
    margin: 0;
    height: 100vh;
    background: #2c3e50;
    overflow: hidden;
    cursor: none;
}
#magnet-btn {
    position: absolute;
    padding: 25px 50px;
    font-size: 22px;
    background: #e74c3c;
    color: white;
    border: none;
    border-radius: 50px;
    cursor: pointer;
    transition: transform 0.1s;
    pointer-events: none;
    box-shadow: 0 0 30px rgba(231, 76, 60, 0.6);
}
#magnet-btn:active {
    transform: scale(0.9);
}
#cursor {
    position: fixed;
    width: 20px;
    height: 20px;
    border: 2px solid white;
    border-radius: 50%;
    pointer-events: none;
    transition: transform 0.1s;
}
.trail {
    position: absolute;
    width: 10px;
    height: 10px;
    background: rgba(231, 76, 60, 0.5);
    border-radius: 50%;
    pointer-events: none;
    animation: trailFade 0.5s forwards;
}
@keyframes trailFade {
    to { opacity: 0; transform: scale(0); }
}
</style>
</head>
<body>
<div id="cursor"></div>
<button id="magnet-btn">🧲 MAGNET</button>

<script>
const btn = document.getElementById('magnet-btn');
const cursor = document.getElementById('cursor');
let mouseX = window.innerWidth/2, mouseY = window.innerHeight/2;
let btnX = window.innerWidth/2, btnY = window.innerHeight/2;

document.addEventListener('mousemove', (e) => {
    mouseX = e.clientX;
    mouseY = e.clientY;
    cursor.style.left = (mouseX - 10) + 'px';
    cursor.style.top = (mouseY - 10) + 'px';
});

function animate() {
    // Smooth follow with easing
    const dx = mouseX - btnX;
    const dy = mouseY - btnY;
    
    btnX += dx * 0.1;
    btnY += dy * 0.1;
    
    btn.style.left = (btnX - btn.offsetWidth/2) + 'px';
    btn.style.top = (btnY - btn.offsetHeight/2) + 'px';
    
    // Create trail occasionally
    if (Math.random() > 0.8) {
        const trail = document.createElement('div');
        trail.className = 'trail';
        trail.style.left = (btnX + (Math.random() - 0.5) * 50) + 'px';
        trail.style.top = (btnY + (Math.random() - 0.5) * 30) + 'px';
        document.body.appendChild(trail);
        setTimeout(() => trail.remove(), 500);
    }
    
    requestAnimationFrame(animate);
}

btn.addEventListener('click', () => {
    // Explode away
    const angle = Math.random() * Math.PI * 2;
    const force = 500;
    mouseX += Math.cos(angle) * force;
    mouseY += Math.sin(angle) * force;
    
    // Change color
    const colors = ['#e74c3c', '#3498db', '#2ecc71', '#f39c12', '#9b59b6'];
    btn.style.background = colors[Math.floor(Math.random() * colors.length)];
    btn.style.boxShadow = `0 0 30px ${btn.style.background}`;
    
    // Change text
    const texts = ['🧲 MAGNET', '⚡ ZAP!', '💨 POOF!', '🎯 GOTCHA!', '🔥 HOT!'];
    btn.textContent = texts[Math.floor(Math.random() * texts.length)];
});

animate();
</script>
</body>
</html>
