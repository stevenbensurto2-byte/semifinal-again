<!DOCTYPE html>
<html>
<head>
<style>
body {
    background: url(BG5.JPG);
}
h1 {
    text-decoration: UNDERline;
	text-align: CENTER;
	font-size: 200%;
	color:WHITE;
	border: 5px solid GREY;
	background-color:DARKGREY;
	margin-LEFT: 600px;
	margin-RIGHT: 600px;
}
p.uppercase {
	text-decoration: underline;
    text-transform: uppercase;
	text-align: CENTER;
	font-size: 110%;
	color:WHITE;
	border: 5px solid GREY;
	background-color:DARKGREY;
	margin-LEFT: 450px;
	margin-RIGHT: 450px;
}

p.lowercase {
	text-decoration: underline;
    text-transform: lowercase;
	text-align: CENTER;
	font-size: 110%;
	color:WHITE;
	border: 5px solid GREY;
	background-color:DARKGREY;
	margin-LEFT: 450px;
	margin-RIGHT: 450px;
}

p.capitalize {
	text-decoration: underline;
    text-transform: capitalize;
	text-align: CENTER;
	font-size: 110%;
	color:WHITE;
	border: 5px solid GREY;
	background-color:DARKGREY;
	margin-LEFT: 450px;
	margin-RIGHT: 450px;
}
</style>
</head>
<body>
<h1>TEXT TRANSFORM EXAMPLE</h1>
<p class="uppercase">steven</p>
<p class="lowercase">aguilar</p>
<p class="capitalize">Bensurto</p>

</body>
</html>
