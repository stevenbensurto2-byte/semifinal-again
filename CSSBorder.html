<!DOCTYPE html>
<html>
<head>
<style>
h1 {
	text-align: CENTER;
	font-size: 200%; 
	color:WHITE;
	border: 5px solid GREY;
	background-color:DARKGREY; 
	margin-LEFT: 10px;
	margin-RIGHT: 10px;
	margin-BOTTOM: 50px;
}
body { 
	background: url(BG4.JPG);
	no-repeat center fixed; 
	background-size: cover;
}

p.dotted {margin-BOTTOM: 10px; text-align: CENTER; font-size: 150%; background-color:DARKGREY; color:WHITE; border-style: dotted;}
p.dashed {margin-BOTTOM: 10px; text-align: CENTER; font-size: 150%; background-color:DARKGREY; color:WHITE; border-style: dashed;}
p.solid {margin-BOTTOM: 10px; text-align: CENTER; font-size: 150%; background-color:DARKGREY; color:WHITE; border-style: solid;}
p.double {margin-BOTTOM: 10px; text-align: CENTER; font-size: 150%; background-color:DARKGREY; color:WHITE; border-style: double;}
p.groove {margin-BOTTOM: 10px; text-align: CENTER; font-size: 150%; background-color:DARKGREY; color:WHITE; border-style: groove;}
p.ridge {margin-BOTTOM: 10px; text-align: CENTER; font-size: 150%; background-color:DARKGREY; color:WHITE; border-style: ridge;}
p.inset {margin-BOTTOM: 10px; text-align: CENTER; font-size: 150%; background-color:DARKGREY; color:WHITE; border-style: inset;}
p.outset {margin-BOTTOM: 10px; text-align: CENTER; font-size: 150%; background-color:DARKGREY; color:WHITE; border-style: outset;}
p.none {margin-BOTTOM: 10px; text-align: CENTER; font-size: 150%; background-color:DARKGREY; color:WHITE; border-style: none;}
p.hidden {margin-BOTTOM: 10px; text-align: CENTER; font-size: 150%; background-color:DARKGREY; color:WHITE; border-style: hidden;}
p.mix {margin-BOTTOM: 10px; text-align: CENTER; font-size: 150%; background-color:DARKGREY; color:WHITE; border-style: dotted dashed solid double;}
</style>
</head>
<body>

<h1>THE EXAMPLE OF BORDER-STYLE PROPERTY</h1>
<p>This property specifies what kind of border to display:</p>

<p class="dotted">A DOTTED BORDER</p>
<p class="dashed">A DASHED BORDER</p>
<p class="solid">A SOLID BORDER</p>
<p class="double">A DOUBLE BORDER</p>
<p class="groove">A GROOVE BORDER</p>
<p class="ridge">A RIFDGE BORDER</p>
<p class="inset">A INSET BORDER</p>
<p class="outset">AN OUTSET BORDER</p>
<p class="none">NO BORDER</p>
<p class="hidden">A HIDDEN BORDER</p>
<p class="mix">A MIXED BORDER</p>

</body>
</html>
