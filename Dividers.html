<!DOCTYPE html>
<html>
<head>
<style>
body {
    background: url(BG5.JPG);	
}
h1 {
	text-transform: uppercase;
	text-decoration: UNDERline;
	text-align: CENTER;
	font-size: 200%;
	color:WHITE;
	border: 5px solid paleturquoise;
	background-color: steelblue;
	margin-LEFT: 600px;
	margin-RIGHT: 600px;
	margin-BOTTOM: 30px;
}
p {
	text-align: CENTER;
	font-size: 130%;
	color:WHITE;
	border: 5px solid paleturquoise;
	background-color: steelblue;
	margin-LEFT: 450px;
	margin-RIGHT: 450px;
}
ul {
    list-style-type: none;
    margin: 0;
    padding: 0;
    overflow: hidden;
    background-color: steelblue;
}
li {
    float: left;
    border-right:1px solid #bbb;
}
li:last-child {
    border-right: none;
}
li a {
    display: block;
    color: white;
    text-align: center;
    padding: 14px 16px;
    text-decoration: none;
}
li a:hover:not(.active) {
    background-color: violet;
}
.active {
    background-color: steelblue;
}
</style>
</head>
<body>

<h1> HORIZONTAL NAVIGATION WITH DIVIDERS EXAMPLE </h1>

<ul>
  <li><a class="active" href="#POGI">Bensurto</a></li>
  <li><a href="#home">Home</a></li>
  <li><a href="#news">News</a></li>
  <li><a href="#contact">Contact</a></li>
  <li style="float:right"><a href="#about">About</a></li>
</ul>

<p> In this example, we have active horizontal navigation bar. </p>
  
</ul>
</body>
</html>
