<!DOCTYPE html>
<html>
<head>
<style>
body { margin: 0; overflow: hidden; background: linear-gradient(135deg, #1e3c72, #2a5298); }
canvas { display: block; }
</style>
</head>
<body>
<canvas id="canvas"></canvas>
<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

const balls = [];
const gravity = 0.5;
const friction = 0.8;

class Ball {
    constructor(x, y, dx, dy, radius, color) {
        this.x = x;
        this.y = y;
        this.dx = dx;
        this.dy = dy;
        this.radius = radius;
        this.color = color;
    }
    
    draw() {
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
        ctx.fillStyle = this.color;
        ctx.fill();
        ctx.strokeStyle = 'rgba(255,255,255,0.3)';
        ctx.stroke();
        ctx.closePath();
        
        // Shine effect
        ctx.beginPath();
        ctx.arc(this.x - this.radius/3, this.y - this.radius/3, this.radius/4, 0, Math.PI * 2);
        ctx.fillStyle = 'rgba(255,255,255,0.3)';
        ctx.fill();
    }
    
    update() {
        if (this.y + this.radius + this.dy > canvas.height) {
            this.dy = -this.dy * friction;
        } else {
            this.dy += gravity;
        }
        
        if (this.x + this.radius > canvas.width || this.x - this.radius < 0) {
            this.dx = -this.dx;
        }
        
        this.x += this.dx;
        this.y += this.dy;
        this.draw();
    }
}

const colors = ['#FF6B6B', '#4ECDC4', '#45B7D1', '#FFA07A', '#98D8C8', '#F7DC6F'];

canvas.addEventListener('click', (e) => {
    const radius = Math.random() * 30 + 20;
    const dx = (Math.random() - 0.5) * 10;
    const dy = (Math.random() - 0.5) * 10;
    const color = colors[Math.floor(Math.random() * colors.length)];
    balls.push(new Ball(e.clientX, e.clientY, dx, dy, radius, color));
});

// Start with a few balls
for (let i = 0; i < 5; i++) {
    const radius = Math.random() * 30 + 20;
    const x = Math.random() * (canvas.width - radius * 2) + radius;
    const y = Math.random() * (canvas.height / 2);
    const dx = (Math.random() - 0.5) * 8;
    const dy = Math.random() * 2;
    const color = colors[Math.floor(Math.random() * colors.length)];
    balls.push(new Ball(x, y, dx, dy, radius, color));
}

function animate() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    balls.forEach(ball => ball.update());
    requestAnimationFrame(animate);
}

animate();
</script>
</body>
</html>
