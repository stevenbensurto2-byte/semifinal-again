<!DOCTYPE html>
<html>

   <head>
      <title>Set Image Alignment</title>
   </head>
	
   <body>
   <h1 align = "center">SET IMAGE ALIGNMENT</h1>
		<hr>
      <p>Setting image Alignment in left</p>
      <img src = "Netflix.jpg" alt = "Netflix" border = "3" align = "left"/>
	  <p>Setting image Alignment in center</p>
      <img src = "Youtube.jpg" alt = "Youtube" border = "3" align = "center" width = "400" height = "250"/>
	  <p align = "right">Setting image Alignment in right</p>
      <img src = "Spotify.jpg" alt = "Spotify" border = "3" align = "right"/>
   </body>
	
</html>
