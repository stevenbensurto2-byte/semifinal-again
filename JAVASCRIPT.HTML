<!DOCTYPE html>
<html>
<head>
    <title>Change Text</title>
</head>
<body>
    <h1 id="message">This text will change!</h1>
    <button onclick="changeText()">Click to Change</button>

    <script>
        function changeText() {
            document.getElementById("message").innerHTML = "✨ Yehey!!You clicked the button! ✨";
        }
    </script>
</body>
</html>
