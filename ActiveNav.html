<!DOCTYPE html>
<html>
<head>
<style>
body {
    background: url(BG5.JPG);	
}
ul {
    list-style-type: none;
    margin: 0;
    padding: 0;
    width: 200px;
    background-color: #f1f1f1;
}
h1 {
    text-shadow: 5px 3px GREY;
	text-transform: uppercase;
	text-decoration: UNDERline;
	text-align: CENTER;
	font-size: 200%;
	color:WHITE;
	border: 5px solid GREY;
	background-color:DARKGREY;
	margin-LEFT: 600px;
	margin-RIGHT: 600px;
	margin-BOTTOM: 30px;
}
p {
	text-align: CENTER;
	font-size: 130%;
	color:WHITE;
	border: 5px solid GREY;
	background-color:DARKGREY;
	margin-LEFT: 450px;
	margin-RIGHT: 450px;
}
li a {
    display: block;
    color: #000;
    padding: 8px 16px;
    text-decoration: none;
}
li a.active {
    background-color: lightsteelblue;
    color: white;
}
li a:hover:not(.active) {
    background-color: navy;
    color: white;
}
</style>
</head>
<body>

<h1>ACTIVE NAVIGATION BAR EXAMPLE</h1>
<p>In this example, we create an "active" class with a lightsteelblue background color and a white text. The class is added to the "Home" link.</p>

<ul>
	<li><a class="active" href="#POGI">Bensurto</a></li>
	<li><a href="#home">Home</a></li>
	<li><a href="#news">News</a></li>
	<li><a href="#contact">Contact</a></li>
	<li><a href="#about">About</a></li>
</ul>

</body>
</html>
