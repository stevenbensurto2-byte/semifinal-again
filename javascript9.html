<!DOCTYPE html>
<html>
<head>
<style>
body {
    margin: 0;
    height: 100vh;
    background: #2c3e50;
    overflow: hidden;
}
#teleport-btn {
    position: absolute;
    padding: 20px 40px;
    font-size: 20px;
    background: #9b59b6;
    color: white;
    border: 3px dashed white;
    border-radius: 10px;
    cursor: pointer;
    transition: all 0.3s;
}
#teleport-btn:hover {
    background: #8e44ad;
    transform: scale(1.05);
}
.ghost {
    position: absolute;
    padding: 20px 40px;
    font-size: 20px;
    background: rgba(155, 89, 182, 0.3);
    color: rgba(255, 255, 255, 0.5);
    border: 3px dashed rgba(255, 255, 255, 0.3);
    border-radius: 10px;
    pointer-events: none;
    animation: fadeOut 0.5s forwards;
}
@keyframes fadeOut {
    to { opacity: 0; transform: scale(1.5); }
}
.spark {
    position: absolute;
    width: 4px;
    height: 4px;
    background: #fff;
    border-radius: 50%;
    pointer-events: none;
    animation: spark 0.6s forwards;
}
@keyframes spark {
    to { 
        transform: translate(var(--tx), var(--ty)) scale(0);
        opacity: 0;
    }
}
</style>
</head>
<body>
<button id="teleport-btn">👻 TELEPORT</button>

<script>
const btn = document.getElementById('teleport-btn');

function createGhost(x, y) {
    const ghost = document.createElement('div');
    ghost.className = 'ghost';
    ghost.textContent = '👻 TELEPORT';
    ghost.style.left = x + 'px';
    ghost.style.top = y + 'px';
    document.body.appendChild(ghost);
    setTimeout(() => ghost.remove(), 500);
}

function createSparks(x, y) {
    for (let i = 0; i < 30; i++) {
        const spark = document.createElement('div');
        spark.className = 'spark';
        spark.style.left = x + 'px';
        spark.style.top = y + 'px';
        const angle = (Math.PI * 2 * i) / 30;
        const dist = 50 + Math.random() * 100;
        spark.style.setProperty('--tx', Math.cos(angle) * dist + 'px');
        spark.style.setProperty('--ty', Math.sin(angle) * dist + 'px');
        document.body.appendChild(spark);
        setTimeout(() => spark.remove(), 600);
    }
}

function teleport() {
    const rect = btn.getBoundingClientRect();
    createGhost(rect.left, rect.top);
    createSparks(rect.left + rect.width/2, rect.top + rect.height/2);
    
    // Random new position
    const newX = Math.random() * (window.innerWidth - 200);
    const newY = Math.random() * (window.innerHeight - 100);
    
    btn.style.opacity = '0';
    btn.style.transform = 'scale(0)';
    
    setTimeout(() => {
        btn.style.left = newX + 'px';
        btn.style.top = newY + 'px';
        btn.style.opacity = '1';
        btn.style.transform = 'scale(1)';
        createSparks(newX + 100, newY + 30);
    }, 300);
}

btn.addEventListener('click', teleport);
// Initial position
btn.style.left = '100px';
btn.style.top = '100px';
</script>
</body>
</html>
