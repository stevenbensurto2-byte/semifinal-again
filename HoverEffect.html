<!DOCTYPE html>
<html>
<head>
<style>
img {
    opacity: 0.7;
    filter: alpha(opacity=50); /* For IE8 and earlier */
	display: block;      
    margin-left: auto;    
    margin-right: auto;
	margin-BOTTOM: 30px;
}
img:hover {
    opacity: 1.0;
    filter: alpha(opacity=100); /* For IE8 and earlier */
	display: block;      
    margin-left: auto;    
    margin-right: auto;
	margin-BOTTOM: 30px;
}
body {
    background: url(BG3.JPG);	
}
h1 {
    text-shadow: 5px 3px GREY;
	text-transform: uppercase;
	text-decoration: UNDERline;
	text-align: CENTER;
	font-size: 200%;
	color:WHITE;
	border: 5px solid GREY;
	background-color:DARKGREY;
	margin-LEFT: 600px;
	margin-RIGHT: 600px;
	margin-BOTTOM: 30px;
}
p {
	text-align: CENTER;
	font-size: 130%;
	color:WHITE;
	border: 5px solid GREY;
	background-color:DARKGREY;
	margin-LEFT: 450px;
	margin-RIGHT: 450px;
}
</style>
</head>
<body>
<h1>HOVER EFFECT EXAMPLE</h1>
<p>The opacity property is often used together with the :hover selector to change the opacity on mouse-over:</p>
<a href = "https://open.spotify.com/" target = "_self"> 
	<img src="SPOTIFY.JPG" alt="SPOTIFY logo" width="200" height="200">
</a>
<a href = "https://discord.com/" target = "_self"> 
	<img src="DISCORD.JPG" alt="DISCORD logo" width="200" height="200">
</a>
<a href = "https://www.youtube.com/" target = "_self">
	<img src="YOUTUBE.JPG" alt="YOUTUBE logo" width="200" height="200">
</a>
<p><b>Note:</b> In IE, a !DOCTYPE must be added for the :hover selector to work on other elements than the a element.</p>
<p>STEVEN A. BENSURTO</p>
</body>
</html>
