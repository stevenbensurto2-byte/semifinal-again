<!DOCTYPE html>
<html>
<head>
    <title>Color Changer</title>
</head>
<body id="myBody">
    <h1>Background Color Changer</h1>
    <button onclick="changeColor()">Change Color</button>

    <script>
        function changeColor() {
            document.getElementById("myBody").style.backgroundColor = "lightblue";
        }
    </script>
</body>
</html>
