}
img.youtube {
    opacity: 0.3;

}
body {

}

	text-align: CENTER;

	border: 5px solid GREY;

<body>

<h1>IMAGE TRANSPARENCY/PPACITY EXAMPLE</h1>
<p>The opacity property specifies the transparency of an element. The lower the value, the more transparent:</p>

<p>STEVEN A. BENSURTO</p>
<p>Image with 70% opacity:</p>
<img src="youtube.JPG" alt="Forest" width="200" height="200">
<p>Image with 30% opacity:</p>
<img class="youtube" src="youtube.JPG" alt="Forest" width="200" height="200">
