<!DOCTYPE html>
<html>
<head>
    <title>Counter</title>
</head>
<body>
    <h1>Count: <span id="count">0</span></h1>
    <button onclick="addOne()">Add 1</button>

    <script>
        let number = 0;
        
        function addOne() {
            number = number + 1;
            document.getElementById("count").innerHTML = number;
        }
    </script>
</body>
</html>
