<!DOCTYPE html>
<html>
<head>
<style>
body {
    background: url(BG5.JPG);	
}
h1 {
	text-transform: uppercase;
	text-decoration: UNDERline;
	text-align: CENTER;
	font-size: 200%;
	color:WHITE;
	border: 5px solid paleturquoise;
	background-color: steelblue;
	margin-LEFT: 600px;
	margin-RIGHT: 600px;
	margin-BOTTOM: 30px;
}
p {
	text-align: CENTER;
	font-size: 130%;
	color:WHITE;
	border: 5px solid paleturquoise;
	background-color: steelblue;
	margin-LEFT: 450px;
	margin-RIGHT: 450px;
}
ul {
    list-style-type: none;
    margin: 0;
    padding: 0;
    width: 200px;
    background-color: #f1f1f1;
    border: 3px double #555;
}
li a {
    display: block;
    color: #000;
    padding: 8px 16px;
    text-decoration: none;
}

li {
    text-align: center;
    border-bottom: 1px solid black;
	color: white;
}
li:last-child {
    border-bottom: none;
}
li a.active {
    background-color: lightsteelblue;
    color: white;
}

li a:hover:not(.active) {
    background-color:navy;
	color: plum;;
}
</style>
