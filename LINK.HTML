<!DOCTYPE html>
<html>

   <head>
      <title>Hyperlink Example</title>
      <base href = "https://www.youtube.com/">
   </head>
	
   <body>
   <h1 align = "center">HYPERLINK</h1>
		<hr>
      <p>Click any of the following links</p>
      <a href = "https://www.youtube.com/" target = "_blank">Opens Youtube in New Tab</a> |
      <a href = "https://www.youtube.com/" target = "_self">Opens Youtube in current Tab</a> |
      <a href = "https://www.youtube.com/" target = "_parent">Opens Youtube in Parent Tab</a> |
      <a href = "https://www.youtube.com/" target = "_top">Opens Youtube in Body</a>
   </body>

</html>
